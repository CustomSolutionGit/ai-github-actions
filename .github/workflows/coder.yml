name: Coder Agent

on:
  issues:
    types: [opened, labeled]

jobs:
  code:
    if: contains(github.event.issue.labels.*.name, 'to-code')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate code via LLM
        uses: openai-actions/codegen@v1
        with:
          prompt: ${{ github.event.issue.body }}

      - name: Push changes
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@example.com"
          git checkout -b ai-task-${{ github.event.issue.number }}
          git add .
          git commit -m "AI task #${{ github.event.issue.number }}"
          git push origin HEAD

      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ai-task-${{ github.event.issue.number }}
          title: "AI Task #${{ github.event.issue.number}}"
          body: "Generated by Coder Agent"
          labels: reviewer